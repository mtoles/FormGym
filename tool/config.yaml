# Training configuration
task_name_prefix: "<OPEN_VOCABULARY_DETECTION>"
train_batch_size: 8
# train_batch_size: 64
val_batch_size: 64
num_workers: 0
epochs: 1
learning_rate: 1e-6
model_name: "microsoft/Florence-2-large-ft"
# model_revision: "refs/pr/6" 
epochs_per_eval: 0.2
checkpoint_dir: "tool/checkpoints"
max_iou_examples: 64

# PEFT configuration
use_peft: false
peft_config:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules: ["q_proj", "v_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

# Dataset paths
train_paths: ["tool/dataset/processed/funsd_train_qa_pairs.json", "tool/dataset/processed/xfund_train_qa_pairs.json"]
eval_path: "tool/dataset/processed/funsd_test_qa_pairs.json"
